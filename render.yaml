services:
  - type: web
    name: decasa-api
    env: docker
    rootDir: decasa-api
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_TIMEZONE
        value: America/Bogota
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        value: "245631"
      - key: REVERB_APP_KEY
        value: acf5kf3mhbshm9ddtic3
      - key: REVERB_APP_SECRET
        sync: false   # definido en el panel de Render, nunca en el YAML versionado
      - key: REVERB_HOST
        value: "127.0.0.1"
      - key: REVERB_PORT
        value: "8080"
      - key: REVERB_SCHEME
        value: http
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: warning
      - key: APP_URL
        value: https://decasa-api-b91v.onrender.com
      - key: SANCTUM_STATEFUL_DOMAINS
        value: sistema-de-ventas-olive.vercel.app
      # --- Mail (Gmail SMTP) — valores definidos en el panel de Render, no aquí ---
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        sync: false   # correo Gmail en panel de Render
      - key: MAIL_PASSWORD
        sync: false   # contraseña de aplicación Gmail en panel de Render
      - key: MAIL_FROM_ADDRESS
        sync: false   # igual que MAIL_USERNAME
      - key: MAIL_FROM_NAME
        value: "Decasa"
      # --- Cloudinary — definidos en el panel de Render ---
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
